<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #eef2f7;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .card {
            background: white;
            padding: 3rem;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            text-align: center;
            max-width: 450px;
        }
        .icon { font-size: 3rem; margin-bottom: 1rem; }
        h2 { color: #4a6fa5; margin-bottom: 0.5rem; }
        p { color: #888; margin-bottom: 2rem; font-size: 0.95rem; }
        .btn-logout {
            padding: 0.7rem 2rem;
            background: #e8edf5;
            color: #4a6fa5;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.2s;
        }
        .btn-logout:hover { background: #d0d9eb; }
    </style>
</head>
<body>
<div class="card">
    <div class="icon">🎉</div>
    <h2>Halo, {{.Nama}}!</h2>
    <p>Selamat, Anda berhasil login.</p>
    <a href="/logout" class="btn-logout">Keluar</a>
</div>
</body>
</html>
