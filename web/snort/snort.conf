# =============================================
# SNORT 2.9 CONFIGURATION — Kamsis Web Server
# Mode: IDS + IPS (Intrusion Detection & Prevention)
# DAQ diatur via command line di entrypoint.sh
# =============================================

# ---- Network Variables ----
ipvar HOME_NET any
ipvar EXTERNAL_NET any
ipvar HTTP_SERVERS 172.20.0.40
ipvar SQL_SERVERS any

portvar HTTP_PORTS [80,443]
portvar MYSQL_PORTS 3306

# ---- Paths ----
var RULE_PATH /etc/snort/rules
var LOG_PATH /var/log/snort

# ---- Logging ----
config logdir: /var/log/snort

# ---- Performance ----
config utc
config show_year
config checksum_mode: none

# ---- Classifications ----
config classification: web-application-attack,Web Application Attack,1
config classification: attempted-user,Attempted User Privilege Gain,1
config classification: attempted-dos,Attempted Denial of Service,2
config classification: attempted-recon,Attempted Information Leak,2
config classification: misc-activity,Misc activity,3
config classification: trojan-activity,Trojan Activity,1

# =============================================
# RULES
# =============================================

# 1. Rules buatan sendiri (SQLi, XSS, CMDi, dll)
include $RULE_PATH/local.rules

# 2. Rules ICMP
include $RULE_PATH/icmp.rules

# 3. Community rules (download otomatis dari snort.org saat build)
include $RULE_PATH/community.rules